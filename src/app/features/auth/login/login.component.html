<div class="auth-page">
  <div class="auth-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">⚡</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Login to access your history and more</p>

    <div class="guest-notice">
      🔓 Calculator works without login too!
      <a routerLink="/calculator">Try it →</a>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>

      <!-- Email -->
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap" [class.err]="emailCtrl.invalid && emailCtrl.touched">
          <span class="input-icon">✉️</span>
          <input
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>
        <span class="field-error" *ngIf="emailCtrl.invalid && emailCtrl.touched">
          {{ emailCtrl.errors?.['required'] ? 'Email is required.' : 'Enter a valid email.' }}
        </span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap" [class.err]="passwordCtrl.invalid && passwordCtrl.touched">
          <span class="input-icon">🔒</span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-pwd" (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <span class="field-error" *ngIf="passwordCtrl.invalid && passwordCtrl.touched">
          Password must be at least 6 characters.
        </span>
      </div>

      <!-- Server Error -->
      <div class="error-box" *ngIf="error()">⚠️ {{ error() }}</div>

      <!-- Submit -->
      <button type="submit" class="submit-btn" [disabled]="loading()">
        <span *ngIf="!loading()">Login →</span>
        <span *ngIf="loading()">⏳ Logging in...</span>
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/register">Create one →</a>
    </p>
  </div>
</div>
